  <link rel="icon" type="image/png" href="/logo.png" />
  
  <!-- Theme Detection & Non-blocking loader setup -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = savedTheme === 'dark' || (!savedTheme && systemPrefersDark);
      if (isDark) {
        document.documentElement.classList.add('dark');
      }
      const bgStyle = document.createElement('style');
      bgStyle.innerHTML = `body.ns-loading { background: ${isDark ? 'hsl(230, 28%, 7%)' : '#f8fafc'} !important; }`;
      document.head.appendChild(bgStyle);
    })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Preload Intro Screen script for parallel rendering -->
  <link rel="preload" as="script" href="/intro.js" />

  <!-- Intro screen styles -->
  <link rel="stylesheet" href="/intro.css">
</head>

<body class="ns-loading">

  <!-- Intro overlay — rendered at byte 0 before React bundle loads -->
  <div id="ns-intro" role="dialog" aria-label="NinuSoft Loading" aria-live="polite" style="display: none;">
    <div class="ns-glow ns-glow-1"></div>
    <div class="ns-glow ns-glow-2"></div>

    <div class="ns-stage">
      <!-- Logo + scan -->
      <div class="ns-logo-wrap" id="ns-logo-wrap">
        <div class="ns-bracket ns-tl"></div>
        <div class="ns-bracket ns-tr"></div>
        <div class="ns-bracket ns-bl"></div>
        <div class="ns-bracket ns-br"></div>
        <div id="ns-scan-glow"></div>
        <div id="ns-scan"></div>
        <img src="/logo.png" alt="NinuSoft logo" class="ns-logo" id="ns-logo" />
      </div>

      <!-- Brand name -->
      <div class="ns-brand">
        <h1><span class="ns-ninu">Ninu</span><span class="ns-split-s">S</span><span class="ns-soft">oft</span> <span class="ns-ai">AI</span></h1>
        <p>NinuSoft AI — Google AI Pro</p>
      </div>

      <!-- Status -->
      <div id="ns-status">
        <span class="ns-dot ns-dot-idle" id="ns-dot"></span>
        <span id="ns-status-text">جاري التهيئة&hellip;</span>
      </div>

      <!-- Progress bar -->
      <div class="ns-bar-track">
        <div id="ns-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- React app root -->
  <div id="root"></div>

  <!-- React bundle -->
  <script type="module" src="/src/main.tsx"></script>

  <!-- Intro controller -->
  <script src="/intro.js"></script>

</body>

</html>
